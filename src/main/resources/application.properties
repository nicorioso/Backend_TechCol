# Aplicaci�n
spring.application.name=TechCop
server.servlet.context-path=/api
server.port=8080

# Base de datos
spring.datasource.url=${BD_URL}
spring.datasource.username=${BD_USERNAME}
spring.datasource.password=${BD_PASSWORD}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson (JSON)
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

#spring-boot-starter-mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio config
twilio.account.sid=${TWILIO_ID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.phone.number=${TWILIO_NUMBER}

file.upload-dir=uploads/products
google.client-id=${GOOGLE_CLIENT_ID}

jwt.secret=${JWT_SECRET}

# paypal config
paypal.client-id=${PAYPAL_ID}
paypal.client-secret=${PAYPAL_SECRET}
paypal.base-url=https://api-m.sandbox.paypal.com
