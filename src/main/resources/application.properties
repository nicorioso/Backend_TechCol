# Aplicaciï¿½n
spring.application.name=TechCop
server.servlet.context-path=/api
server.port=${PORT:8080}

# Base de datos
spring.datasource.url=${DB_URL:${BD_URL:jdbc:mysql://localhost:3306/techcop_db_dev?useSSL=false&serverTimezone=UTC}}
spring.datasource.username=${DB_USER:${BD_USERNAME:root}}
spring.datasource.password=${DB_PASSWORD:${BD_PASSWORD:}}
spring.sql.init.mode=never

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson (JSON)
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

#spring-boot-starter-mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio config
twilio.account.sid=${TWILIO_ID:}
twilio.auth.token=${TWILIO_TOKEN:}
twilio.phone.number=${TWILIO_NUMBER:}

file.upload-dir=uploads/products
google.client-id=${GOOGLE_CLIENT_ID:}

jwt.secret=${JWT_SECRET:change-this-jwt-secret-for-production-2026}

# paypal config
paypal.client-id=${PAYPAL_ID:}
paypal.client-secret=${PAYPAL_SECRET:}
paypal.base-url=https://sandbox.paypal.com
paypal.return-url=${PAYPAL_RETURN_URL:http://localhost:8080/api/paypal/return}
paypal.cancel-url=${PAYPAL_CANCEL_URL:http://localhost:8080/api/paypal/cancel}
paypal.frontend-return-url=${PAYPAL_FRONTEND_RETURN_URL:http://localhost:5173/checkout}
paypal.frontend-cancel-url=${PAYPAL_FRONTEND_CANCEL_URL:http://localhost:5173/checkout}

# CORS
# Desarrollo local por defecto. Para producciÃ³n, configura estas variables en el hosting.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://127.0.0.1:5173}
# Ejemplo para hosting: https://tu-frontend.com,https://www.tu-frontend.com
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization,X-Total-Count,X-Page-Number,X-Page-Size}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Security cookies
# Local HTTP por defecto: false. En produccion HTTPS define REFRESH_COOKIE_SECURE=true.
app.security.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}

# reCAPTCHA config
recaptcha.site-key=${RECAPTCHA_SITE_KEY:}
recaptcha.secret=${RECAPTCHA_SECRET_KEY:}
